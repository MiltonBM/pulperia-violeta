version: '3.8'

services:
  backend:
    build: ./backend
    container_name: pulperia-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pulperia-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped