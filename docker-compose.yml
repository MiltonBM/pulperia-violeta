version: '3.8'

services:
  backend:
    build: ./backend
    container_name: pulperia-backend
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_USER=sa
      - DB_PASSWORD=sistemas
      - DB_SERVER=host.docker.internal
      - DB_NAME=PulperiaVioletaDB
      - DB_ENCRYPT=false
      - DB_TRUST_CERT=true
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: pulperia-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped